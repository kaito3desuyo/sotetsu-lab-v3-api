name: CI
on:
    push:
        branches-ignore:
            - master
    pull_request:

jobs:
    test-and-lint:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Use Node.js 24.x
              uses: actions/setup-node@v6
              with:
                  node-version: 24.x
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Type check
              run: npx tsc --noEmit

            - name: Lint
              run: npm run lint

            - name: Test
              run: npm test
